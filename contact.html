  <div class="contactcontainer">
    <!-- head section -->
    <div class="headcontact">Contact me</div>


    <style>
      /* Start Contact */
      .contact .container1 {
        width: 80%;
        padding-top: var(--main-padding-top);
        padding-bottom: var(--main-padding-top);
      }

      .contact {

        background-color: #ececec;
        padding-bottom: var(--section-padding);
        padding-bottom: 30px;
        padding-top: 30px;
      }

      .contact .content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 100%;
        margin-left: 20px;
        margin-right: 20px;
      }

      @media (max-width: 767px) {
        .contact .content {
          flex-direction: column;
        }
      }

      .contact .content form {
        flex-basis: 70%;
      }

      .contact .content form .main-input {
        padding: 20px;
        display: block;
        border: 1px solid #ccc;
        margin-bottom: 30px;
        width: 100%;
      }

      .contact .content form .main-input:focus {
        outline: none;
      }

      .contact .content form textarea.main-input {
        height: 200px;
      }

      .contact .content form input[type="submit"] {
        background-color: var(--main-color);
        color: white;
        padding: 20px;
        border: none;
        display: flex;
        margin-left: auto;
        text-transform: uppercase;
        cursor: pointer;
      }

      .contact .content .info {
        flex-basis: 25%;
        padding-left: 30px;
      }

      @media (max-width: 767px) {
        .contact .content .info {
          order: -1;
          text-align: center;
        }
      }

      .contact .content .info h4 {

        color: #000;
        font-weight: 500;
        font-size: 18px;
      }

      .contact .content .info .phone {
        display: block;
        color: #000000;
        margin-bottom: 10px;
      }

      .contact .content .info h4:nth-of-type(2) {
        margin-top: 90px;
      }

      @media (max-width: 767px) {
        .contact .content .info h4:nth-of-type(2) {
          margin-top: 30px;
        }
      }

      .contact .content .info address {
        color: #000000;
        line-height: 2;
      }

      @media (max-width: 767px) {
        .contact .content .info address {
          margin-bottom: 40px;
        }
      }

      .main-input:focus {
        border-color: var(--main-color);
        transform: scale(1.05);
        transition: transform 0.2s ease, border-color 0.2s ease;
      }

      /* End Contact */
      .container1 {
        padding-left: 10px;
        padding-right: 10px;
        margin-left: auto;
        margin-right: auto;
        background-color: var(--section-background);

      }



      :root {
        --main-color: #1e1e1e;
        --secondary-color: #272727;
        --text-color: #e0e0e0;
        --accent-color: #4caf50;
        --box-shadow-color: rgba(0, 0, 0, 0.7);
        --main-transition: 0.3s;
        --main-padding-top: 100px;
        --main-padding-bottom: 100px;
        --section-background: #ececec;

      }
    </style>

    <div class="contact">
      <div class="container1">


        <div class="content">
          <form action="">
            <input class="main-input" type="text" name="name" placeholder="Your Name" />
            <input class="main-input" type="email" name="mail" placeholder="Your Email" />
            <textarea class="main-input" name="message" placeholder="Your Message"></textarea>
            <input type="submit" value="Send Message" />
          </form>
          <div class="info">
            <h4>Where We Are</h4>
            <address> Address 97<br />Zarqa<br />962-785956180<br />Jordan</address>
          </div>
        </div>
      </div>
    </div>

  <script>
    function myFunction() {
      var x = document.getElementById("myTopnav");
      if (x.className === "topnav") {
        x.className += " responsive";
      } else {
        x.className = "topnav";
      }
    }
  </script>
